name: Daily Podcast Generation

on:
  schedule:
    - cron: '0 21 * * *'   # 05:00 KL time (UTC+8)
  workflow_dispatch:
    inputs:
      date:
        description: 'Override episode date (YYYY-MM-DD). Leave blank to use UTC today.'
        required: false
        default: ''

permissions:
  contents: write            # needed to push generated audio + feed.xml back

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate podcast episode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_PAGES_BASE_URL: https://ishikawak-lab.github.io/ai-english-podcast
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python podcast_generator.py --date "$INPUT_DATE"
          else
            python podcast_generator.py
          fi

      - name: Commit and push generated files
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          EPISODE_DATE="${INPUT_DATE:-$(date -u +%Y-%m-%d)}"
          git commit -m "chore: add episode ${EPISODE_DATE}"
          git pull --rebase origin main
          git push

  retry:
    runs-on: ubuntu-latest
    needs: generate
    if: failure()
    timeout-minutes: 30

    steps:
      - name: Wait 10 minutes before retry
        run: sleep 600

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate podcast episode (retry)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_PAGES_BASE_URL: https://ishikawak-lab.github.io/ai-english-podcast
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python podcast_generator.py --date "$INPUT_DATE"
          else
            python podcast_generator.py
          fi

      - name: Commit and push generated files
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          EPISODE_DATE="${INPUT_DATE:-$(date -u +%Y-%m-%d)}"
          git commit -m "chore: add episode ${EPISODE_DATE} (retry)"
          git pull --rebase origin main
          git push
